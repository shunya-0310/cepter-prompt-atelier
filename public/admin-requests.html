<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>更新依頼 | Cepter Prompt Atelier</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #061d17;
        --panel: #0a261e;
        --panel-2: #103528;
        --line: rgba(244, 211, 111, 0.34);
        --text: #f6edcf;
        --muted: #d8cc9d;
        --gold: #f4d36f;
        --accent: #7ee08b;
        --danger: #ff9a7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 20% 0%, rgba(244, 211, 111, 0.08), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
        line-height: 1.7;
      }

      a {
        color: var(--gold);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .page {
        width: min(1080px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 64px;
      }

      header {
        border-bottom: 1px solid var(--line);
        margin-bottom: 20px;
        padding-bottom: 16px;
      }

      .kicker {
        color: var(--gold);
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        margin-top: 8px;
        font-size: clamp(1.8rem, 8vw, 3rem);
        line-height: 1.18;
      }

      h2 {
        font-size: 1.35rem;
      }

      h3 {
        color: var(--gold);
        font-size: 1rem;
      }

      .lead,
      .hint {
        color: var(--muted);
      }

      .tabs,
      .actions,
      .row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tab,
      .button {
        border: 1px solid var(--line);
        background: rgba(6, 29, 23, 0.9);
        color: var(--text);
        cursor: pointer;
        padding: 10px 14px;
      }

      .tab[aria-selected="true"],
      .button.primary {
        background: linear-gradient(180deg, #ffe27e, #b58a2a);
        border-color: rgba(255, 229, 129, 0.8);
        color: #071b14;
        font-weight: 700;
      }

      .button.danger {
        border-color: rgba(255, 154, 122, 0.42);
        color: var(--danger);
      }

      .panel {
        border: 1px solid var(--line);
        background: rgba(10, 38, 30, 0.76);
        margin-top: 16px;
        padding: 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
      }

      .field {
        grid-column: span 12;
      }

      .field.small {
        grid-column: span 6;
      }

      .field.tiny {
        grid-column: span 3;
      }

      label {
        display: block;
        color: var(--gold);
        font-size: 0.9rem;
        margin-bottom: 4px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: #041812;
        color: var(--text);
        padding: 10px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .card-update {
        border: 1px solid rgba(244, 211, 111, 0.22);
        background: rgba(4, 24, 18, 0.7);
        margin-top: 14px;
        padding: 14px;
      }

      .card-update-head {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .status {
        min-height: 1.5em;
      }

      .status.ok {
        color: var(--accent);
      }

      .status.error {
        color: var(--danger);
      }

      pre {
        overflow: auto;
        border: 1px solid rgba(244, 211, 111, 0.22);
        background: #03120e;
        color: var(--muted);
        padding: 12px;
        white-space: pre-wrap;
      }

      [hidden] {
        display: none !important;
      }

      @media (max-width: 720px) {
        .page {
          width: min(100% - 18px, 1080px);
          padding-top: 14px;
        }

        .panel {
          padding: 12px;
        }

        .field.small,
        .field.tiny {
          grid-column: span 12;
        }

        .button,
        .tab {
          min-height: 44px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <a href="./">Cepter Prompt Atelierに戻る</a>
        <div class="kicker">Automation Request</div>
        <h1>更新依頼</h1>
        <p class="lead">スマホからカード更新やデプロイ依頼を登録するための管理ページです。依頼はGitHub Issueとして保存され、CodexのSkillが読み取って処理します。</p>
      </header>

      <section class="panel">
        <div class="grid">
          <div class="field">
            <label for="adminKey">管理キー</label>
            <input id="adminKey" type="password" autocomplete="current-password" placeholder="Cloudflare Workerに設定した CEPTER_ADMIN_KEY" />
          </div>
        </div>
      </section>

      <nav class="tabs" aria-label="依頼種別">
        <button class="tab" type="button" data-tab="card" aria-selected="true">カード更新</button>
        <button class="tab" type="button" data-tab="deploy" aria-selected="false">デプロイ依頼</button>
      </nav>

      <section class="panel" data-panel="card">
        <h2>カード更新依頼</h2>
        <p class="hint">カードごとに入力してください。未判明のレアリティは空欄でOKです。コストの「カード」は自動で「□」に変換します。</p>

        <div class="grid">
          <div class="field small">
            <label for="cardVersionLabel">更新ラベル</label>
            <input id="cardVersionLabel" placeholder="例: 20260622-card-update" />
          </div>
          <div class="field">
            <label for="cardRequestNote">補足</label>
            <textarea id="cardRequestNote" placeholder="判断に迷う点、出典メモなど"></textarea>
          </div>
        </div>

        <div id="cardUpdates"></div>

        <div class="actions">
          <button class="button" type="button" id="addCard">カード行を追加</button>
          <button class="button" type="button" id="previewCardJson">JSON確認</button>
          <button class="button primary" type="button" id="submitCardRequest">GitHub Issueに登録</button>
        </div>
        <p class="status" id="cardStatus" role="status"></p>
        <pre id="cardPreview" hidden></pre>
      </section>

      <section class="panel" data-panel="deploy" hidden>
        <h2>デプロイ依頼</h2>
        <p class="hint">ファイル更新後に「デプロイお願い」と言うための依頼を登録します。カード更新以外の修正にも使います。</p>
        <div class="grid">
          <div class="field">
            <label for="deployReason">内容</label>
            <textarea id="deployReason" placeholder="例: 関連サイトページを更新したので、本番へ反映してください。"></textarea>
          </div>
          <div class="field">
            <label for="deployFiles">関連ファイル</label>
            <textarea id="deployFiles" placeholder="任意。分かる範囲でファイル名やページ名を入力"></textarea>
          </div>
        </div>
        <div class="actions">
          <button class="button primary" type="button" id="submitDeployRequest">GitHub Issueに登録</button>
        </div>
        <p class="status" id="deployStatus" role="status"></p>
      </section>
    </main>

    <script src="./assets/embedded/app-data.js"></script>
    <script>
      const CARD_SOURCES = [
        { dataKey: "neutral", category: "creature", element: "無" },
        { dataKey: "fire", category: "creature", element: "火" },
        { dataKey: "water", category: "creature", element: "水" },
        { dataKey: "earth", category: "creature", element: "地" },
        { dataKey: "wind", category: "creature", element: "風" },
        { dataKey: "item", category: "item", element: "" },
        { dataKey: "spell", category: "spell", element: "" },
      ];

      const tabs = [...document.querySelectorAll("[data-tab]")];
      const panels = [...document.querySelectorAll("[data-panel]")];
      const adminKey = document.querySelector("#adminKey");
      const cardUpdates = document.querySelector("#cardUpdates");
      const cardStatus = document.querySelector("#cardStatus");
      const deployStatus = document.querySelector("#deployStatus");
      const cardPreview = document.querySelector("#cardPreview");
      const cardCatalog = [];

      const savedKey = localStorage.getItem("cepter-admin-key");
      if (savedKey) adminKey.value = savedKey;
      adminKey.addEventListener("input", () => localStorage.setItem("cepter-admin-key", adminKey.value));

      function setStatus(element, message, type = "") {
        element.textContent = message;
        element.className = `status ${type}`.trim();
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((item) => item.setAttribute("aria-selected", String(item === tab)));
          panels.forEach((panel) => {
            panel.hidden = panel.dataset.panel !== tab.dataset.tab;
          });
        });
      });

      function parseTsv(text) {
        const [headerLine, ...lines] = String(text || "").trim().split(/\r?\n/);
        const headers = headerLine.split("\t");
        return lines.filter(Boolean).map((line) => {
          const values = line.split("\t");
          return Object.fromEntries(headers.map((header, index) => [header, values[index] || ""]));
        });
      }

      function splitKind(kind, fallbackElement = "") {
        const raw = String(kind || "").trim();
        const rarityMatch = raw.match(/^(.*?)([NSRE])$/);
        const base = rarityMatch ? rarityMatch[1] : raw;
        const rarity = rarityMatch ? rarityMatch[2] : "";
        if (["無", "火", "水", "地", "風"].includes(base.slice(0, 1))) {
          return { element: base.slice(0, 1), kind: base.slice(1), rarity };
        }
        return { element: fallbackElement, kind: base, rarity };
      }

      function buildCardCatalog() {
        const embedded = window.CEPTER_EMBEDDED_DATA?.cardData || {};
        CARD_SOURCES.forEach((source) => {
          const rows = parseTsv(embedded[source.dataKey] || "");
          rows.forEach((row) => {
            const kind = splitKind(row["種類"], source.element);
            cardCatalog.push({
              name: row["カード名"],
              category: source.category,
              element: kind.element || source.element,
              kind: kind.kind,
              rarity: kind.rarity,
              cost: row["コスト"] || "",
              at: row["AT"] || "",
              hp: row["HP"] || "",
              placement: row["配置"] || "",
              usage: row["使用"] || "",
              effect: row["能力・効果"] || "",
            });
          });
        });
        cardCatalog.sort((a, b) => a.name.localeCompare(b.name, "ja"));
      }

      function cardOptionsHtml() {
        return [
          '<option value="">既存カードから選択</option>',
          ...cardCatalog.map((card) => {
            const label = `${card.name}（${card.category === "creature" ? card.element : card.category === "item" ? "アイテム" : "スペル"}）`;
            return `<option value="${escapeHtml(card.name)}">${escapeHtml(label)}</option>`;
          }),
        ].join("");
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function cardTemplate(index) {
        return `
          <section class="card-update" data-card-update>
            <div class="card-update-head">
              <h3>カード ${index + 1}</h3>
              <button class="button danger" type="button" data-remove-card>削除</button>
            </div>
            <div class="grid">
              <div class="field small">
                <label>操作</label>
                <select data-field="operation">
                  <option value="upsert">新規または修正</option>
                  <option value="update">既存カード修正</option>
                  <option value="create">新規カード追加</option>
                </select>
              </div>
              <div class="field small">
                <label>カード分類</label>
                <select data-field="category">
                  <option value="creature">クリーチャー</option>
                  <option value="item">アイテム</option>
                  <option value="spell">スペル</option>
                </select>
              </div>
              <div class="field small">
                <label>カード名</label>
                <select data-field="existingName" data-existing-card-field>
                  ${cardOptionsHtml()}
                </select>
                <input data-field="name" data-card-name-input placeholder="新規カード名、または選択せず手入力" />
              </div>
              <div class="field tiny">
                <label>属性</label>
                <select data-field="element">
                  <option value="-">-</option>
                  <option value="無">無</option>
                  <option value="火">火</option>
                  <option value="水">水</option>
                  <option value="地">地</option>
                  <option value="風">風</option>
                </select>
              </div>
              <div class="field tiny">
                <label>種別</label>
                <input data-field="kind" placeholder="例: 複瞬 / 武 / 防" />
              </div>
              <div class="field tiny">
                <label>レアリティ</label>
                <select data-field="rarity">
                  <option value="">不明</option>
                  <option value="N">N</option>
                  <option value="S">S</option>
                  <option value="R">R</option>
                  <option value="E">E</option>
                </select>
              </div>
              <div class="field tiny">
                <label>コスト</label>
                <input data-field="cost" placeholder="例: G30+地地" />
              </div>
              <div class="field tiny">
                <label>AT</label>
                <input data-field="at" placeholder="-" />
              </div>
              <div class="field tiny">
                <label>HP</label>
                <input data-field="hp" placeholder="-" />
              </div>
              <div class="field tiny">
                <label>配置制限</label>
                <input data-field="placement" placeholder="-" />
              </div>
              <div class="field tiny">
                <label>使用制限</label>
                <input data-field="usage" placeholder="-" />
              </div>
              <div class="field">
                <label>能力・効果</label>
                <textarea data-field="effect" placeholder="カードテキスト"></textarea>
              </div>
            </div>
          </section>
        `;
      }

      function addCardRow() {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = cardTemplate(cardUpdates.querySelectorAll("[data-card-update]").length).trim();
        const row = wrapper.firstElementChild;
        cardUpdates.append(row);
        syncCardRowMode(row);
        syncCategoryFields(row);
      }

      function collectCardUpdates() {
        return [...cardUpdates.querySelectorAll("[data-card-update]")]
          .map((section) => {
            const item = {};
            section.querySelectorAll("[data-field]").forEach((field) => {
              item[field.dataset.field] = field.value.trim();
            });
            item.name = item.name || item.existingName || "";
            delete item.existingName;
            return item;
          })
          .filter((item) =>
            ["name", "kind", "rarity", "cost", "at", "hp", "placement", "usage", "effect"].some((key) => item[key]),
          );
      }

      function buildCardPayload() {
        return {
          type: "card-update",
          title: "カードデータ更新",
          versionLabel: document.querySelector("#cardVersionLabel").value.trim(),
          note: document.querySelector("#cardRequestNote").value.trim(),
          updates: collectCardUpdates(),
        };
      }

      function setField(section, fieldName, value) {
        const field = section.querySelector(`[data-field="${fieldName}"]`);
        if (field) field.value = value || "";
      }

      function selectedCard(section) {
        const name = section.querySelector('[data-field="existingName"]')?.value || "";
        return cardCatalog.find((card) => card.name === name);
      }

      function fillFromSelectedCard(section) {
        const card = selectedCard(section);
        if (!card) return;
        setField(section, "category", card.category);
        setField(section, "element", card.category === "creature" ? card.element || "無" : "-");
        setField(section, "kind", card.kind);
        setField(section, "rarity", card.rarity);
        setField(section, "cost", card.cost);
        setField(section, "at", card.at);
        setField(section, "hp", card.hp);
        setField(section, "placement", card.placement);
        setField(section, "usage", card.usage);
        setField(section, "effect", card.effect);
        setField(section, "name", "");
        syncCategoryFields(section);
      }

      function syncCardRowMode(section) {
        const operation = section.querySelector('[data-field="operation"]')?.value || "upsert";
        const existingField = section.querySelector("[data-existing-card-field]");
        if (!existingField) return;
        existingField.hidden = operation === "create";
        if (operation === "create") existingField.value = "";
      }

      function syncCategoryFields(section) {
        const category = section.querySelector('[data-field="category"]')?.value || "creature";
        const elementField = section.querySelector('[data-field="element"]');
        if (!elementField) return;

        if (category === "creature") {
          elementField.disabled = false;
          if (!elementField.value || elementField.value === "-") elementField.value = "無";
          return;
        }

        elementField.value = "-";
        elementField.disabled = true;
      }

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "x-cepter-admin-key": adminKey.value,
          },
          body: JSON.stringify(payload),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        return data;
      }

      document.querySelector("#addCard").addEventListener("click", addCardRow);
      cardUpdates.addEventListener("click", (event) => {
        const button = event.target.closest("[data-remove-card]");
        if (!button) return;
        button.closest("[data-card-update]").remove();
      });

      cardUpdates.addEventListener("change", (event) => {
        const section = event.target.closest("[data-card-update]");
        if (!section) return;
        if (event.target.dataset.field === "operation") syncCardRowMode(section);
        if (event.target.dataset.field === "category") syncCategoryFields(section);
        if (event.target.dataset.field === "existingName") fillFromSelectedCard(section);
      });

      document.querySelector("#previewCardJson").addEventListener("click", () => {
        const payload = buildCardPayload();
        cardPreview.hidden = false;
        cardPreview.textContent = JSON.stringify(payload, null, 2);
      });

      document.querySelector("#submitCardRequest").addEventListener("click", async () => {
        try {
          const payload = buildCardPayload();
          setStatus(cardStatus, "登録中です...");
          const data = await postJson("/api/automation/card-update-request", payload);
          setStatus(cardStatus, `登録しました: ${data.issueUrl || data.message}`, "ok");
        } catch (error) {
          setStatus(cardStatus, error.message, "error");
        }
      });

      document.querySelector("#submitDeployRequest").addEventListener("click", async () => {
        try {
          const payload = {
            type: "deploy-request",
            title: "デプロイ依頼",
            reason: document.querySelector("#deployReason").value.trim(),
            files: document.querySelector("#deployFiles").value.trim(),
          };
          setStatus(deployStatus, "登録中です...");
          const data = await postJson("/api/automation/deploy-request", payload);
          setStatus(deployStatus, `登録しました: ${data.issueUrl || data.message}`, "ok");
        } catch (error) {
          setStatus(deployStatus, error.message, "error");
        }
      });

      buildCardCatalog();
      addCardRow();
    </script>
  </body>
</html>
